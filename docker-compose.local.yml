services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kg-api-local
    restart: unless-stopped
    depends_on:
      - neo4j
      - ollama
    environment:
      APP_ENV: dev
      OPENAI_API_KEY: ollama
      OPENAI_BASE_URL: http://ollama:11434/v1
      OPENAI_SMALL_MODEL: llama3.2:3b
      OPENAI_LARGE_MODEL: llama3.2:3b
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jforlocal
      SLACK_BOT_TOKEN: local-placeholder
      SLACK_SIGNING_SECRET: local-placeholder
      GOOGLE_CREDENTIALS_FILE_PATH: ./google-service-account.json
      INGESTION_API_TOKEN: local-dev-token
    ports:
      - "8001:8001"

  neo4j:
    image: neo4j:5.23
    container_name: kg-neo4j-local
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4jforlocal
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  ollama:
    image: ollama/ollama:latest
    container_name: kg-ollama-local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  neo4j_data:
  neo4j_logs:
  ollama_data:
